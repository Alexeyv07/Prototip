<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказы | Личный кабинет Технопарк</title>
    <script>
        // Определяем устройство и перенаправляем
        (function() {
            var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            // Дополнительная проверка по ширине экрана
            var isSmallScreen = window.innerWidth < 960;
            
            if (isMobile || isSmallScreen) {
                // Мобильное устройство - загружаем мобильную версию
                window.location.href = 'index-mobile.html';
            } else {
                // Десктоп - загружаем десктопную версию
                window.location.href = 'index-desktop.html';
            }
        })();
    </script>
</head>
<body>
    <p>Загрузка...</p>
</body>
</html>
